version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Frontend Guardian – self-hosted stack
#
# Usage:
#   cp .env.guardian .env
#   # Edit .env and set GUARDIAN_API_KEY (generate with: openssl rand -hex 32)
#   docker compose up -d
#
# Dashboard: http://localhost:3000
# API:       http://localhost:4000
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Analysis server ─────────────────────────────────────────────────────────
  guardian-server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    container_name: guardian-server
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: "4000"
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Dashboard (React + nginx) ────────────────────────────────────────────────
  guardian-dashboard:
    build:
      context: .
      dockerfile: packages/dashboard/Dockerfile
    container_name: guardian-dashboard
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      guardian-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
